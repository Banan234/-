# Nginx-конфигурация для production-контейнера web (см. Dockerfile, target=web).
# Слушает 80, отдаёт SPA из /usr/share/nginx/html, проксирует /api/* на app:3001.

upstream api_upstream {
    # `app` — имя сервиса в docker-compose.yml.
    server app:3001;
    keepalive 32;
}

# Кэш-стратегия для длинных ассетов с хешами в имени (vite ставит Cache-Control).
map $sent_http_content_type $static_immutable {
    default                 "";
    ~application/javascript "public, max-age=31536000, immutable";
    ~text/css               "public, max-age=31536000, immutable";
    ~font/                  "public, max-age=31536000, immutable";
    ~image/                 "public, max-age=2592000";
}

server {
    listen 80;
    server_name _;

    # CSP для SPA. Inline script нужен только для JSON-LD (prerender/useJsonLd),
    # inline style — для текущих React style={{...}}. Внешние источники ограничены
    # Метрикой и Sentry cloud; для self-hosted GlitchTip добавьте его origin в connect-src.
    set $site_csp "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://mc.yandex.ru https://*.mc.yandex.ru; font-src 'self'; connect-src 'self' https://mc.yandex.ru https://*.mc.yandex.ru https://*.ingest.sentry.io https://*.sentry.io; frame-src 'none'; worker-src 'self' blob:; manifest-src 'self'; media-src 'self'";

    # Brotli-модули загружаются в Dockerfile в main nginx.conf. Brotli отдаётся
    # клиентам с Accept-Encoding: br, gzip остаётся fallback для старых клиентов.
    brotli on;
    brotli_static on;
    brotli_comp_level 5;
    brotli_min_length 1024;
    brotli_types
        text/html
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # Включаем gzip на текстовом контенте. Бинарь vite уже сжимает на этапе build,
    # но gzip-ответ на лету для index.html / json остаётся полезным.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # Базовая защита заголовков.
    add_header Content-Security-Policy $site_csp always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Liveness-проба самого Nginx — без обращения к API.
    # Используется и Docker HEALTHCHECK, и внешним балансировщиком.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    # Прокси на Express API.
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 30s;
        proxy_pass http://api_upstream;
    }

    # Статика vite: длинный кэш только для /assets/* (имена с хешем).
    # index.html и /fonts/, /documents/ не кэшируем агрессивно — иначе старые
    # клиенты будут грузить устаревший манифест.
    location /assets/ {
        expires 1y;
        # add_header в location сбрасывает наследование server-level headers,
        # поэтому security headers здесь продублированы явно.
        add_header Content-Security-Policy $site_csp always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA-fallback: всё, что не файл и не /api, отдаёт index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
