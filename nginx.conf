# Файл настраивает production nginx для раздачи статики, SPA fallback, кеширования и проксирования API.

# Nginx-конфигурация для production-контейнера web (см. Dockerfile, target=web).
# Слушает 80, отдаёт SPA из /usr/share/nginx/html, проксирует /api/* на app:3001.

upstream api_upstream {
    # `app` — имя сервиса в docker-compose.yml.
    server app:3001;
    keepalive 32;
}

# Кэш-стратегия для длинных ассетов с хешами в имени (vite ставит Cache-Control).
map $sent_http_content_type $static_immutable {
    default                 "";
    ~application/javascript "public, max-age=31536000, immutable";
    ~text/css               "public, max-age=31536000, immutable";
    ~font/                  "public, max-age=31536000, immutable";
    ~image/                 "public, max-age=2592000";
}

# За внешним TLS reverse proxy внутренний Nginx всегда видит plain HTTP.
# Сохраняем исходный протокол из X-Forwarded-Proto для app upstream и
# выключаем absolute redirects, чтобы Location не деградировал до http://.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    ~*^https?$ $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    absolute_redirect off;
    port_in_redirect off;
    server_tokens off;
    more_clear_headers Server;

    # CSP для SPA. Inline script запрещён; JSON-LD вставляется как
    # application/ld+json, а executable-скрипты разрешены только с self/Метрики.
    # Yandex map widgets на /contacts и /delivery требуют iframe только с
    # yandex.ru / yandex.com, поэтому frame-src открыт точечно под эти origins.
    # Inline style пока нужен для текущих React style={{...}}.
    set $site_csp "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://mc.yandex.ru; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://mc.yandex.ru https://*.mc.yandex.ru; font-src 'self'; connect-src 'self' https://mc.yandex.ru https://*.mc.yandex.ru https://*.ingest.sentry.io https://*.sentry.io; frame-src https://yandex.ru https://yandex.com; worker-src 'self' blob:; manifest-src 'self'; media-src 'self'";
    set $api_csp "default-src 'none'; base-uri 'none'; connect-src 'self'; font-src 'none'; form-action 'none'; frame-ancestors 'none'; frame-src 'none'; img-src 'none'; manifest-src 'none'; media-src 'none'; object-src 'none'; script-src 'none'; script-src-attr 'none'; style-src 'none'; worker-src 'none'";

    # Brotli-модули загружаются в Dockerfile в main nginx.conf. Brotli отдаётся
    # клиентам с Accept-Encoding: br, gzip остаётся fallback для старых клиентов.
    brotli on;
    brotli_static on;
    brotli_comp_level 5;
    brotli_min_length 1024;
    brotli_types
        text/html
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # Включаем gzip на текстовом контенте. Бинарь vite уже сжимает на этапе build,
    # но gzip-ответ на лету для index.html / json остаётся полезным.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # Базовая защита заголовков.
    add_header Content-Security-Policy $site_csp always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy same-origin always;

    # Liveness-проба самого Nginx — без обращения к API.
    # Используется и Docker HEALTHCHECK, и внешним балансировщиком.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    # Прокси на Express API.
    location /api/ {
        add_header Content-Security-Policy $api_csp always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy same-origin always;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_hide_header Server;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Cross-Origin-Opener-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Powered-By;
        proxy_set_header Connection        "";
        proxy_read_timeout 30s;
        proxy_pass http://api_upstream;
    }

    # Статика vite: длинный кэш только для /assets/* (имена с хешем).
    # index.html и /fonts/, /documents/ не кэшируем агрессивно — иначе старые
    # клиенты будут грузить устаревший манифест.
    location /assets/ {
        expires 1y;
        # add_header в location сбрасывает наследование server-level headers,
        # поэтому security headers здесь продублированы явно.
        add_header Content-Security-Policy $site_csp always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy same-origin always;
        more_set_headers "Cache-Control: public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Стабильные публичные ассеты из public/: не хешируются vite, но редко
    # меняются и безопасны для долгого браузерного кэша.
    location ~ ^/(hero-bg[^/]*\.(?:avif|webp)|logo\.(?:webp|png)|favicon-32\.png|favicon\.ico|product-placeholder\.svg|category-placeholders/[A-Za-z0-9-]+\.svg|fonts/[A-Za-z0-9._-]+)$ {
        expires 1y;
        add_header Content-Security-Policy $site_csp always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy same-origin always;
        more_set_headers "Cache-Control: public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Файлы, которые могут обновляться runtime-импортом прайса без пересборки
    # web-образа. Если runtime-файла ещё нет, используем fallback из dist/.
    location ~ ^/(robots\.txt|sitemap(?:-[A-Za-z0-9-]+)?\.xml|price\.xls)$ {
        root /usr/share/nginx;
        add_header Content-Security-Policy $site_csp always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cache-Control "no-cache";
        try_files /runtime-data/public/$1 /html/$1 =404;
    }

    # 301-редиректы для переименованных карточек товара.
    # Подключаем только конфиг из immutable web-образа, а не из runtime-data:
    # runtime volume содержит данные импорта, но не должен исполняться nginx.
    # Glob-include не падает, если файла нет (свежая инсталляция без импорта).
    include /usr/share/nginx/html/redirects.nginx.conf*;

    # Для неизвестных URL отдаём отдельный 404-shell с корректным head, а не
    # общий index.html главной страницы.
    error_page 404 /404.html;

    location = /404.html {
        internal;
        try_files /404.html =404;
    }

    # Базовые статические страницы канонизируем со trailing slash. Используем
    # relative Location, чтобы внешний TLS proxy сохранил https-схему.
    location ~ ^/(catalog|contacts|delivery|payment|about)$ {
        return 308 /$1/$is_args$args;
    }

    location ~ ^/(catalog|contacts|delivery|payment|about)/+$ {
        return 308 /$1/;
    }

    location ~ ^/catalog/([A-Za-z0-9-]+)/+$ {
        return 308 /catalog/$1;
    }

    location ~ ^/product/([A-Za-z0-9-]+)/+$ {
        return 308 /product/$1;
    }

    location = / {
        try_files /index.html =404;
    }

    location = /catalog/ {
        try_files /catalog/index.html =404;
    }

    location = /about/ {
        try_files /about/index.html =404;
    }

    location = /contacts/ {
        try_files /contacts/index.html =404;
    }

    location = /delivery/ {
        try_files /delivery/index.html =404;
    }

    location = /payment/ {
        try_files /payment/index.html =404;
    }

    location = /privacy {
        try_files /privacy/index.html =404;
    }

    # Корзина остаётся клиентским SPA-route: прямой заход разрешаем,
    # но только для этого известного URL, без общего wildcard-fallback.
    location = /cart {
        try_files /index.html =404;
    }

    location ~ ^/catalog/([A-Za-z0-9-]+)$ {
        try_files /catalog/$1/index.html =404;
    }

    # Product prerender хранится плоско: /product/<slug>.html.
    # Так не создаём 6 700+ директорий /product/<slug>/index.html в Docker layer,
    # но публичные URL остаются прежними: /product/<slug>. Runtime-импорт
    # обязан закрыть все product URL из sitemap; при отсутствии HTML-артефакта
    # отдаём реальный 404.
    location ~ ^/product/([A-Za-z0-9-]+)$ {
        root /usr/share/nginx;
        try_files /runtime-data/public/product/$1.html /html/product/$1.html =404;
    }

    # Всё остальное не считаем валидным роутом и не подменяем главной страницей.
    location / {
        try_files $uri =404;
    }
}
