# Production-окружение: Express API + Nginx со статикой.
# Запуск: docker compose up -d --build
# Перед сборкой: убедиться, что data/products.json существует
# (npm run import:price или import:price:remote с PRICE_URL).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ${APP_IMAGE:-yuzhural-site-app}:${DEPLOY_TAG:-latest}
    container_name: yuzhural-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Прокси-цепочка nginx → app: один прыжок, доверяем X-Forwarded-* от Nginx.
      NODE_ENV: production
      PORT: 3001
    expose:
      - '3001'
    volumes:
      # Импорт прайса пишет data/products.json и productRegistry.json.
      # Bind-mount сохраняет их на хосте при пересоздании контейнера.
      - ./data:/app/data
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:3001/api/health']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - yuzhural-net

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        SITE_URL: ${SITE_URL:-https://yuzhuralelectrokabel.ru}
        VITE_SITE_URL: ${VITE_SITE_URL:-https://yuzhuralelectrokabel.ru}
        VITE_YANDEX_METRIKA_ID: ${VITE_YANDEX_METRIKA_ID:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-${DEPLOY_TAG:-latest}}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0}
    image: ${WEB_IMAGE:-yuzhural-site-web}:${DEPLOY_TAG:-latest}
    container_name: yuzhural-web
    restart: unless-stopped
    ports:
      # На VPS обычно фронт-балансировщик/Caddy уже занимает 80/443 и форвардит.
      # Если этот контейнер сам публичный — добавьте 443 + сертификат
      # (см. README, раздел про деплой).
      - '80:80'
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1/healthz']
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - yuzhural-net

networks:
  yuzhural-net:
    driver: bridge
