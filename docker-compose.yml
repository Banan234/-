# Файл описывает production-compose стек сайта: API, nginx, volumes, сети и переменные окружения.

# Production-окружение: Express API + Nginx со статикой.
# Запуск: docker compose up -d --build
# Перед сборкой: убедиться, что data/products.json существует
# (npm run import:price или import:price:remote с PRICE_URL).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ${APP_IMAGE:-yuzhural-site-app}:${DEPLOY_TAG:-latest}
    container_name: yuzhural-app
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      # Прокси-цепочка nginx → app: один прыжок, доверяем X-Forwarded-* от Nginx.
      NODE_ENV: production
      PORT: 3001
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-172.30.0.10}
      # importPrice пишет runtime-public артефакты сюда, а web отдаёт их
      # поверх файлов, запечённых в образ при build.
      PUBLIC_ARTIFACTS_DIR: /app/data/public
    expose:
      - '3001'
    volumes:
      # Импорт прайса пишет data/products.json и productRegistry.json.
      # Bind-mount сохраняет их на хосте при пересоздании контейнера.
      - ./data:/app/data
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:3001/api/health']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      yuzhural-net:
        ipv4_address: 172.30.0.11

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        SITE_URL: ${SITE_URL:-https://yu-uek.ru}
        VITE_SITE_URL: ${VITE_SITE_URL:-https://yu-uek.ru}
        VITE_YANDEX_METRIKA_ID: ${VITE_YANDEX_METRIKA_ID:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-${DEPLOY_TAG:-latest}}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0}
        PRODUCT_PRERENDER_LIMIT: ${PRODUCT_PRERENDER_LIMIT:-720}
        PRODUCT_PRERENDER_INCLUDE: ${PRODUCT_PRERENDER_INCLUDE:-}
    image: ${WEB_IMAGE:-yuzhural-site-web}:${DEPLOY_TAG:-latest}
    container_name: yuzhural-web
    restart: unless-stopped
    ports:
      # По умолчанию Nginx доступен только локально для внешнего TLS reverse proxy.
      # Для другого локального upstream задайте WEB_HTTP_BIND=127.0.0.1:8081.
      - '${WEB_HTTP_BIND:-127.0.0.1:8080}:80'
    depends_on:
      app:
        condition: service_healthy
    volumes:
      # Актуальные sitemap/robots/redirects/price.xls после runtime-импорта.
      - ./data:/usr/share/nginx/runtime-data:ro
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1/healthz']
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      yuzhural-net:
        ipv4_address: 172.30.0.10

networks:
  yuzhural-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
